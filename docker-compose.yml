version: '3.8'

services:
  web:
    build: .
    container_name: budgetbuddy_app
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: budgetbuddy

  db:
    image: mysql:5.7
    container_name: budgetbuddy_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: budgetbuddy
    ports:
      - "3308:3306"